# .github/workflows/talenta-attendance.yml
#
# Struktur folder yang dibutuhkan di repo:
#
# repo-kamu/
# ├── .github/
# │   └── workflows/
# │       └── talenta-attendance.yml   ← file ini
# ├── talenta_clockin.py               ← script python
# ├── selfie.jpg                       ← foto selfie kamu
# └── requirements.txt                 ← dependencies python
#
# NOTE: talenta.apk tidak perlu ada di repo,
#       otomatis didownload dari GitHub Release saat workflow jalan

name: Talenta Auto Attendance

on:
  schedule:
    # Jadwal dalam UTC (WIB = UTC+7, jadi kurangi 7 jam)
    - cron: '0 1 * * 1-5'   # 08:00 WIB Senin-Jumat (Clock In)
    - cron: '0 10 * * 1-5'  # 17:00 WIB Senin-Jumat (Clock Out)

  # Tombol manual — bisa trigger dari GitHub UI
  workflow_dispatch:
    inputs:
      action:
        description: 'Pilih aksi'
        required: true
        default: 'clock_in'
        type: choice
        options:
          - clock_in
          - clock_out

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attendance:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Enable KVM untuk emulator Android (wajib di GitHub Actions)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 3. Setup Java (dibutuhkan Android emulator)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Install Python dependencies
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # 6. Setup Node.js untuk Appium
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 7. Install Appium
      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --version

      # 8. Setup Android SDK / ADB
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 9. Download APK Talenta dari GitHub Release
      - name: Download Talenta APK
        run: |
          curl -L \
            "https://github.com/fantazqis/Testing_Talenta_Automation/releases/download/version_1.0/Talenta-2.42.1.apk" \
            -o talenta.apk
          echo "APK berhasil didownload!"
          ls -lh talenta.apk

      # 9.5 Tentukan aksi clock_in atau clock_out
      - name: Set Attendance Action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ATTENDANCE_ACTION=${{ github.event.inputs.action }}" >> $GITHUB_ENV
          elif [ "$(date -u +%H)" = "01" ]; then
            echo "ATTENDANCE_ACTION=clock_in" >> $GITHUB_ENV
          else
            echo "ATTENDANCE_ACTION=clock_out" >> $GITHUB_ENV
          fi
          echo "Aksi yang dipilih: $ATTENDANCE_ACTION"

      # 10. Jalankan Android Emulator + Script Appium
      - name: Run Attendance Script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: arm64-v8a
          profile: pixel_4
          target: google_apis
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash run_attendance.sh

        env:
          TALENTA_USER: ${{ secrets.TALENTA_USER }}
          TALENTA_PASS: ${{ secrets.TALENTA_PASS }}
          DEVICE_NAME: emulator-5554
          ATTENDANCE_ACTION: ${{ env.ATTENDANCE_ACTION }}

      # 11. Upload log dan screenshot sebagai artifact (untuk debugging)
      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: talenta-debug-${{ github.run_id }}
          path: |
            talenta.log
            screen_after_launch.png
            page_source.xml
          retention-days: 7
